services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: digital-wallet-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/code
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.4
    container_name: digital-wallet-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: digital_wallet
      MYSQL_USER: wallet_user
      MYSQL_PASSWORD: wallet_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
